name: Self-Heal Pipeline

on:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
  schedule:
    - cron: '0 0 * * *' # AUTO-UPDATED
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Trigger only on CI failure, scheduled (default branch), or manual dispatch.
    # Prevent running on selfheal-* branches (loop prevention).
    if: >-
      !startsWith(github.ref_name, 'selfheal-') &&
      ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure') ||
       (github.event_name == 'schedule' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) ||
       github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Pre-Repair Healthcheck
        id: pre_healthcheck
        run: |
          npm ci
          node scripts/healthcheck.mjs
        continue-on-error: true

      - name: Setup Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Self-Heal Repair
        id: repair
        run: |
          node scripts/self_heal.mjs
        continue-on-error: true

      - name: Post-Repair Healthcheck
        id: post_healthcheck
        run: node scripts/healthcheck.mjs
        if: steps.repair.outcome == 'success'
        continue-on-error: true

      - name: Check Git Diff & Entropy (Secret Scanning)
        id: diff_check
        if: steps.post_healthcheck.outcome == 'success'
        run: |
          git add -A
          # Basic secret scan - prevent commits if diff looks like a secret
          ! git diff --cached | grep -iE '(api_key|token|secret|password|credential)'

          if [ -n "$(git status --porcelain)" ]; then
            echo "has_diff=true" >> $GITHUB_OUTPUT
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Cleanup Stale Self-Heal PRs
        if: steps.diff_check.outcome == 'success' && steps.diff_check.outputs.has_diff == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find and close older selfheal PRs to avoid duplicates
          gh pr list --label self-heal --state open --json number -q '.[].number' | xargs -I {} gh pr close {} --comment "Closing in favor of newer self-heal run."

      - name: Create Pull Request
        if: steps.diff_check.outcome == 'success' && steps.diff_check.outputs.has_diff == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="selfheal-fix-$(date +%s)"
          git checkout -b $BRANCH_NAME
          git commit -m "Auto-repair CI failures and drift"
          git push origin $BRANCH_NAME

          TITLE="[Self-Heal] Auto-repair drift and CI failures"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            TITLE="[Self-Heal Scheduled] Drift fixes"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            TITLE="[Self-Heal Reactive] CI fix"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TITLE="[Self-Heal Manual] Repair"
          fi

          gh pr create --title "$TITLE" \
                       --body "This PR was automatically generated by the self-healing pipeline. Please review the changes." \
                       --label "automation,self-heal" \
                       --base ${{ github.event.repository.default_branch }}