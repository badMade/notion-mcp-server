name: Self-Heal CI Pipeline

on:
  schedule:
    - cron: "0 0 * * 0" # AUTO-UPDATED
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    if: |
      (!startsWith(github.ref_name, 'selfheal-')) &&
      (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Cleanup Stale PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STALE_DATE=$(date -d "7 days ago" +%Y-%m-%d)
          gh pr list --label self-heal --state open --search "created:<$STALE_DATE" --json number -q '.[].number' | while read -r pr_number; do
            echo "Closing stale PR #$pr_number"
            gh pr close "$pr_number"
          done

      - name: Check for duplicate PRs
        id: check_duplicate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PR=$(gh pr list --label self-heal --state open --json createdAt -q '.[0].createdAt' || echo "null")
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
            echo "Duplicate open selfheal PR found. Exiting."
            exit 1
          fi

      - name: Pre-Healthcheck
        id: pre_healthcheck
        run: |
          node scripts/healthcheck.mjs > pre-check.log 2>&1 || echo "PRE_HEALTHCHECK_FAILED=true" >> $GITHUB_ENV

      - name: Run Self-Heal
        id: self_heal
        run: node scripts/self_heal.mjs > repair.log 2>&1 || true

      - name: Post-Healthcheck
        if: always()
        id: post_healthcheck
        run: node scripts/healthcheck.mjs > post-check.log 2>&1

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-heal-logs
          path: |
            pre-check.log
            repair.log
            post-check.log

      - name: Check Diff
        if: always()
        id: check_diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "DIFF_EXISTS=true" >> $GITHUB_ENV
          else
            echo "DIFF_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Check Allowed Files
        if: always()
        id: check_files
        run: |
          FORBIDDEN=$(git diff --name-only | grep -E '^(\.github/workflows/ci\.yml|\.env|secrets/|src/.*/migrations/)' || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "Forbidden file changes detected. Exiting."
            exit 1
          fi

      - name: Secret Scanning
        if: always()
        id: secret_scan
        run: |
          git add -A
          SECRETS=$(git diff --staged | grep -iE 'api_key|token|password|secret' || true)
          git reset
          if [ -n "$SECRETS" ]; then
            echo "Potential secrets detected in diff. Exiting."
            exit 1
          fi

      - name: Create PR
        if: ${{ env.DIFF_EXISTS == 'true' && steps.post_healthcheck.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="selfheal-$(date +%s)"
          git checkout -b $BRANCH_NAME

          # Stage specific allowed paths explicitly
          # Exclude .github/workflows/ci.yml and other forbidden files just to be safe
          git add $(git diff --name-only | grep -vE '^(\.github/workflows/ci\.yml|\.env|secrets/|src/.*/migrations/)') || true

          # Check if there is anything staged to avoid commit crash
          if ! git diff --staged --quiet; then
            git commit -m "Auto-repair codebase drift"
            git push origin $BRANCH_NAME

            PR_TITLE="[Self-Heal Manual] Repair"
            if [ "${{ github.event_name }}" == "schedule" ]; then
              PR_TITLE="[Self-Heal Scheduled] Drift fixes"
            elif [ "${{ github.event_name }}" == "workflow_run" ]; then
              PR_TITLE="[Self-Heal Reactive] CI fix"
            fi

            gh pr create --title "$PR_TITLE" \
              --body "Automated code repair generated by Self-Heal CI pipeline.

              Trigger: ${{ github.event_name }}

              Logs can be found in the CI artifacts for this run.
              Please review the changes." \
              --label "self-heal,automation"
          else
            echo "Nothing to commit after filtering out forbidden paths."
          fi
