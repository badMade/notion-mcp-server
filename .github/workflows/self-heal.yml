name: Self-Heal Pipeline

on:
  schedule:
    - cron: '0 4 * * *' # AUTO-UPDATED
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    if: >-
      !startsWith(github.ref_name, 'selfheal-') &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'failure') &&
      (github.event_name != 'schedule' || github.ref_name == github.event.repository.default_branch)
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Check for duplicate open PRs and Close Stale
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Auto-close stale selfheal PRs (older than 7 days)
          STALE_DATE=$(date -d "7 days ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -v-7d +%Y-%m-%dT%H:%M:%SZ)
          gh pr list --label self-heal --state open --json number,createdAt -q ".[] | select(.createdAt < \"$STALE_DATE\") | .number" | while read pr_num; do
            echo "Closing stale PR #$pr_num"
            gh pr close "$pr_num" -c "Closing stale self-healing PR." || true
          done

          # Check if any open self-heal PR remains (within 7 days)
          RECENT_PRS=$(gh pr list --label self-heal --state open --json createdAt -q '. | length' || echo "0")
          if [ "$RECENT_PRS" -gt 0 ]; then
            echo "Open selfheal PR already exists in recent window. Aborting to prevent duplicates."
            exit 0
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pre-Healthcheck
        id: pre_healthcheck
        run: |
          node scripts/healthcheck.mjs || echo "Pre-healthcheck failed, continuing to self-heal."

      - name: Run Self-Heal Pipeline
        id: self_heal
        continue-on-error: true
        run: node scripts/self_heal.mjs

      - name: Check Git Diff
        id: check_diff
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            echo "diff=true" >> $GITHUB_OUTPUT
          else
            echo "diff=false" >> $GITHUB_OUTPUT
            echo "No drift detected or repairs were not successful."
          fi

      - name: Post-Healthcheck
        id: post_healthcheck
        if: steps.check_diff.outputs.diff == 'true'
        run: node scripts/healthcheck.mjs

      - name: Verify No Secrets
        if: steps.check_diff.outputs.diff == 'true' && steps.post_healthcheck.outcome == 'success'
        run: |
          ! git diff --cached -U0 -- ':!package-lock.json' | grep -iE '(secret|password|api[_-]?key|token)'

      - name: Create PR
        if: steps.check_diff.outputs.diff == 'true' && steps.post_healthcheck.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.PAT_WITH_WORKFLOW_SCOPE || secrets.GITHUB_TOKEN }}
        run: |
          TRIGGER_REASON="${{ github.event_name }}"
          TITLE="[Self-Heal] Repair"

          if [ "$TRIGGER_REASON" = "schedule" ]; then
            TITLE="[Self-Heal Scheduled] Drift fixes"
          elif [ "$TRIGGER_REASON" = "workflow_run" ]; then
            TITLE="[Self-Heal Reactive] CI fix"
          elif [ "$TRIGGER_REASON" = "workflow_dispatch" ]; then
            TITLE="[Self-Heal Manual] Repair"
          fi

          BRANCH_NAME="selfheal-$(date +%s)"
          git checkout -b $BRANCH_NAME
          git commit -m "$TITLE"
          git push origin $BRANCH_NAME

          # Read current schedule and rationale from metadata
          CURRENT_SCHEDULE="Unknown"
          RATIONALE="Unknown"
          if [ -f .github/self-heal-schedule.yml ]; then
            CURRENT_SCHEDULE=$(grep "^cron:" .github/self-heal-schedule.yml | cut -d "'" -f 2 || echo "Unknown")
            RATIONALE=$(grep "^rationale:" .github/self-heal-schedule.yml | cut -d ":" -f 2- | sed -e 's/^[[:space:]]*//' || echo "Unknown")
          fi

          gh pr create \
            --title "$TITLE" \
            --body "Automated self-healing PR triggered by: **$TRIGGER_REASON**.\n\n### Self-Healing Context\n- **Current Schedule:** \`${CURRENT_SCHEDULE}\`\n- **Schedule Rationale:** ${RATIONALE}\n\nReviewer Checklist:\n- [ ] Review diff to ensure repairs are logically sound\n- [ ] Ensure tests pass in CI\n\n*Generated by Claude Code / Jules.*" \
            --label "automation" \
            --label "self-heal"