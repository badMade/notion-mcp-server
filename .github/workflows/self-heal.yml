name: Self-Heal Auto-Repair

on:
  schedule:
    - cron: "0 0 * * 0" # AUTO-UPDATED
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run on failure if triggered by workflow_run, or run on schedule/dispatch
    if: >
      (!startsWith(github.ref_name, 'selfheal-')) &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'failure') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Check for duplicate Self-Heal PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close stale PRs older than 7 days
          gh pr list --label self-heal --state open --json number,createdAt --jq '.[] | select((now - (.createdAt | fromdateiso8601)) > 604800) | .number' | xargs -I {} gh pr close {} --comment "Closing stale self-heal PR" || true
          RECENT_PR=$(gh pr list --label self-heal --state open --json createdAt -q '.[0].createdAt' || true)
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
            echo "A self-heal PR is already open. Exiting."
            exit 0
          fi

      - name: Run Self-Heal Pipeline
        id: selfheal
        run: |
          # The self_heal script exits 0 ONLY if there's a fix AND diff, 1 otherwise
          node scripts/self_heal.mjs > repair.log 2>&1

      - name: Verify Allowed Files Only & No Secrets
        if: success()
        run: |
          # 1. Reject forbidden files (secrets, .env, workflows/ci.yml)
          if git diff --name-only | grep -E '(\.env|secrets/|\.github/workflows/ci\.yml|migrations/)'; then
            echo "Forbidden file change detected. Aborting."
            exit 1
          fi

          # 2. Reject changes outside allowed dirs
          if git diff --name-only | grep -vE '^(src/|tests/|scripts/|package.*\.json|\.github/)'; then
             echo "Changes detected outside allowed directories. Aborting."
             exit 1
          fi

          # 3. Simple entropy/secret scan on diff. Need to stage first.
          git add -N .
          if git diff --cached | grep -iE 'apikey|api_key|token|password|secret'; then
             echo "Potential secret detected in diff. Aborting."
             git reset
             exit 1
          fi
          git reset

      - name: Determine PR Title
        if: success()
        id: title
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "title=[Self-Heal Scheduled] Drift fixes" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "title=[Self-Heal Reactive] CI fix" >> $GITHUB_OUTPUT
          else
            echo "title=[Self-Heal Manual] Repair" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="selfheal-$(date +%s)"
          git checkout -b $BRANCH_NAME

          # Stage specific files safely
          for path in src tests scripts package.json package-lock.json eslint.config.mjs .github; do
            git add "$path" 2>/dev/null || true
          done

          if git diff --cached --quiet; then
            echo "No allowed files staged. Exiting."
            exit 0
          fi

          git commit -m "Auto-repair drift/CI failure"
          git push origin $BRANCH_NAME

          RATIONALE=$(cat .github/self-heal-schedule.yml | grep RATIONALE | cut -d"'" -f2 || echo "Computed from recent telemetry")

          gh pr create \
            --title "${{ steps.title.outputs.title }}" \
            --body "Automated self-healing PR triggered by ${{ github.event_name }}.<br><br>**Rationale:** $RATIONALE<br>**Logs:** [View Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})<br><br>See SELF_HEAL_SETUP.md for details. Review required before merging." \
            --label "self-heal" \
            --label "automation" \
            --head $BRANCH_NAME \
            --base main

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: repair-logs
          path: repair.log
