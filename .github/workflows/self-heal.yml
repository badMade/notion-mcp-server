name: Self-Heal Pipeline

on:
  schedule:
    - cron: '0 2 * * *' # AUTO-UPDATED
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  repair:
    # Trigger conditions
    if: >
      (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')
      ) &&
      !startsWith(github.ref_name, 'selfheal-') &&
      (github.event_name != 'schedule' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Close stale self-heal PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close open selfheal PRs older than 7 days
          gh pr list --label self-heal --state open --json number,createdAt | jq -c '.[]' | while read i; do
            CREATED=$(echo $i | jq -r '.createdAt')
            NUM=$(echo $i | jq -r '.number')
            AGE=$(( ( $(date +%s) - $(date -d "$CREATED" +%s) ) / 86400 ))
            if [ $AGE -gt 7 ]; then
              gh pr close $NUM --comment "Auto-closing stale self-heal PR."
            fi
          done

      - name: Check for recent open selfheal PRs
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if there's already an open PR recently created
          COUNT=$(gh pr list --label self-heal --state open --json number | jq '. | length')
          if [ "$COUNT" -gt 0 ]; then
            echo "Open self-heal PR already exists. Skipping run to prevent duplicates."
            echo "skip_run=true" >> $GITHUB_OUTPUT
          else
            echo "skip_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure Git User
        if: steps.check_pr.outputs.skip_run == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Initial Healthcheck
        if: steps.check_pr.outputs.skip_run == 'false'
        id: pre_healthcheck
        run: |
          if node scripts/healthcheck.mjs; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Run Self-Heal Pipeline
        if: steps.check_pr.outputs.skip_run == 'false'
        id: repair_script
        run: node scripts/self_heal.mjs
        continue-on-error: true

      - name: Verify Gate Conditions (Diff, Scope, Secrets)
        if: steps.check_pr.outputs.skip_run == 'false' && steps.repair_script.outcome == 'success'
        id: verify_gates
        run: |
          # Check diff
          if [ -z "$(git status --porcelain)" ]; then
            echo "No diff produced. Failing gate."
            exit 1
          fi

          # Stage all files first so that untracked files generated by repair tools are safely evaluated
          git add .

          # Gate: Prevent modifying forbidden paths
          git diff --cached --name-only | grep -E '(\.env|secrets/|\.github/workflows/ci\.yml|src/.*/migrations/)' && { echo "Forbidden file modified."; exit 1; } || true

          # Gate: Enforce allowed paths
          git diff --cached --name-only | grep -vE '^(src/|tests/|__tests__/|package\.json|package-lock\.json|eslint\.config\.mjs|prettier\.config\.mjs|scripts/)' && { echo "Modified file outside allowed scope."; exit 1; } || true

          # Gate: Secret scanning
          ! git diff --cached | grep -iE '([A-Za-z0-9_]*SECRET[A-Za-z0-9_]*|[A-Za-z0-9_]*TOKEN[A-Za-z0-9_]*|AKIA[0-9A-Z]{16})' || { echo "Potential secret found in diff."; exit 1; }

      - name: Determine PR Title
        if: steps.check_pr.outputs.skip_run == 'false' && steps.verify_gates.outcome == 'success'
        id: pr_title
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "title=[Self-Heal Scheduled] Drift fixes" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "title=[Self-Heal Reactive] CI fix" >> $GITHUB_OUTPUT
          else
            echo "title=[Self-Heal Manual] Repair" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_pr.outputs.skip_run == 'false' && steps.verify_gates.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="selfheal-$(date +%s)"
          git checkout -b $BRANCH_NAME
          git commit -m "Auto-repair via self-heal pipeline"
          git push -u origin $BRANCH_NAME

          gh pr create \
            --title "${{ steps.pr_title.outputs.title }}" \
            --body "Auto-generated repair PR.

            Trigger: ${{ github.event_name }}

            Please review the changes. The self-heal pipeline detected drift or CI failure and successfully applied idempotent repairs." \
            --label "automation,self-heal"
