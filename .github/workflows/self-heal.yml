name: Self-Heal Auto-Repair

on:
  schedule:
    - cron: "0 0 * * 0" # AUTO-UPDATED
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure') &&
      !startsWith(github.ref_name, 'selfheal-') &&
      github.ref == 'refs/heads/main'

    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Cleanup stale self-heal PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find open PRs older than 7 days
          old_prs=$(gh pr list --label self-heal --state open --json number,createdAt | jq -r '.[] | select(.createdAt < (now - 604800 | todateiso8601)) | .number')
          for pr in $old_prs; do
            echo "Closing stale PR #$pr"
            gh pr close "$pr" --comment "Auto-closing stale self-heal PR."
          done

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pre-repair Healthcheck
        id: pre_healthcheck
        continue-on-error: true
        run: node scripts/healthcheck.mjs

      - name: Run Self-Heal Pipeline
        id: repair_pipeline
        if: steps.pre_healthcheck.outcome == 'failure' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/self_heal.mjs

      - name: Verify Git Status and Secrets
        id: git_status
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_diff=true" >> $GITHUB_OUTPUT
            # Basic entropy/secret scan (prevent env/secrets commits)
            if git status --porcelain | grep -E '\.env|secrets/|\.github/workflows/ci\.yml'; then
               echo "Illegal files modified. Aborting."
               return 1 2>/dev/null || false
            fi
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for duplicate PRs
        id: check_pr
        if: steps.git_status.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(gh pr list --label self-heal --state open --json number | jq length)
          if [ "$count" -gt 0 ]; then
            echo "Duplicate PR exists. Skipping creation."
            echo "duplicate=true" >> $GITHUB_OUTPUT
          else
             echo "duplicate=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        if: steps.git_status.outputs.has_diff == 'true' && steps.check_pr.outputs.duplicate == 'false'
        with:
          branch: selfheal-${{ github.run_id }}
          commit-message: "Auto-repair codebase drift"
          title: "[Self-Heal] Auto-repair codebase drift"
          body: "Automated codebase repair triggered by ${{ github.event_name }}. Please review changes."
          labels: "self-heal,automation"
          add-paths: |
            src/
            tests/
            bin/
            scripts/
            package.json
            package-lock.json
            tsconfig.json
