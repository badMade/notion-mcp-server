name: Self-Heal Auto-Repair

on:
  schedule:
    - cron: "0 8 * * *" # AUTO-UPDATED
  workflow_run:
    workflows: ["ci"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  repair:
    runs-on: ubuntu-latest
    if: >
      github.ref_name == 'main' &&
      !startsWith(github.ref_name, 'selfheal-') &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'failure')
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up PR Branch Name
        id: setup-branch
        run: |
          echo "BRANCH_NAME=selfheal-$(date +%s)" >> $GITHUB_ENV

      - name: Cleanup Stale PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STALE_DATE=$(date -d '7 days ago' -u +'%Y-%m-%dT%H:%M:%SZ')
          gh pr list --label self-heal --search "created:<$STALE_DATE" --json number --jq '.[].number' | xargs -I {} gh pr close {} --comment "Closing stale self-heal PR"

      - name: Check for open Self-Heal PRs
        id: check-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PR=$(gh pr list --label self-heal --state open --json createdAt -q '.[0].createdAt')
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
            echo "An open self-heal PR already exists. Skipping repair."
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        if: env.SKIP != 'true'
        run: npm ci

      - name: Run Self-Heal Pipeline
        id: self-heal
        if: env.SKIP != 'true'
        run: |
          node scripts/self_heal.mjs

      - name: Verify Git Diffs & Safety
        if: env.SKIP != 'true'
        run: |
          # Ensure diff only touches allowed files
          git status --porcelain
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes found. Exiting."
            exit 0
          fi

          # Stage allowed files
          git reset
          for path in src/ tests/ scripts/ package.json package-lock.json eslint.config.mjs; do
            git add "$path" 2>/dev/null || true
          done

          # Verify no forbidden paths are staged
          FORBIDDEN=$(git diff --cached --name-only | grep -iE '(.env|secrets/|.github/workflows/ci.yml|migrations/)' || true)
          if [ ! -z "$FORBIDDEN" ]; then
            echo "Forbidden files modified: $FORBIDDEN"
            exit 1
          fi

          # Entropy / Secret scanning
          if git diff --cached -U0 -- ':!package-lock.json' | grep -iE '(api[_-]?key|secret|password)'; then
            echo "Potential secrets found in diff."
            exit 1
          fi

      - name: Create Pull Request
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --cached --quiet; then
            echo "No changes staged for commit."
            exit 0
          fi

          git commit -m "Auto-repair: CI fix and drift updates"
          git branch -m ${{ env.BRANCH_NAME }}
          git push origin ${{ env.BRANCH_NAME }}

          # Determine PR Title based on event
          if [ "${{ github.event_name }}" == "schedule" ]; then
            TITLE="[Self-Heal Scheduled] Drift fixes"
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
            TITLE="[Self-Heal Reactive] CI fix"
          else
            TITLE="[Self-Heal Manual] Repair"
          fi

          # Build PR Body
          PR_BODY="## Self-Healing Automation Triggered

          **Trigger:** ${{ github.event_name }}
          **Context:** This PR was automatically generated by the self-healing coding agent based on a proactive schedule, a reactive CI failure, or a manual trigger. See the Claude Code / Jules chat for initial instructions.

          **Drift Summary:**
          Various drift and linting issues were automatically resolved. See the attached artifact logs (pre-check, repair steps, and post-check) for more context.

          **Schedule Rationale:**
          Calculated via telemetry (refer to \`.github/self-heal-schedule.yml\`).

          ### Reviewer Checklist:
          - [ ] Check \`repair-step-*.log\` artifacts for context on what caused the drift.
          - [ ] Ensure formatting/snapshot updates align with intent.
          - [ ] Confirm no secrets or forbidden files were committed.
          - [ ] Approve and merge."

          gh pr create --title "$TITLE" --body "$PR_BODY" --label self-heal --head ${{ env.BRANCH_NAME }} --base main

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-heal-logs
          path: "*.log"
