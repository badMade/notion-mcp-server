name: Self-Heal Repair
on:
  schedule:
    - cron: '0 0 * * 0' # AUTO-UPDATED
  workflow_run:
    workflows:
      - ci
    types:
      - completed
  workflow_dispatch: null
concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true
jobs:
  repair:
    runs-on: ubuntu-latest
    if: >
      (github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'failure') &&
      !startsWith(github.ref_name, 'selfheal-') && github.ref ==
      'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci || npm install
        continue-on-error: true
      - name: Pre-repair Healthcheck
        id: pre
        run: node scripts/healthcheck.mjs
        continue-on-error: true
      - name: Cleanup stale Self-Heal PRs
        run: |
          # Close PRs older than 7 days
          STALE_PRS=$(gh pr list --label self-heal --state open --json number,createdAt --jq '.[] | select((.createdAt | fromdateiso8601) < (now - 604800)) | .number')
          for PR in $STALE_PRS; do
            gh pr close "$PR" -c "Closing stale self-heal PR"
            echo "Closed stale PR #$PR"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for duplicate Self-Heal PRs
        id: check_pr
        run: |
          OPEN_PRS=$(gh pr list --label self-heal --state open --json number --jq 'length')
          echo "open_prs=$OPEN_PRS" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Self-Heal Pipeline
        id: repair
        if: steps.check_pr.outputs.open_prs == '0'
        run: node scripts/self_heal.mjs
        continue-on-error: true

      - name: Workflow Summary on Repair Failure
        if: steps.repair.outcome == 'failure' && github.event_name == 'schedule'
        run: |
          echo "### ⚠️ Self-Heal Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "The self-heal pipeline could not resolve the drift or CI failure during this scheduled run." >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Post-repair Healthcheck
        id: post
        if: steps.check_pr.outputs.open_prs == '0' && steps.repair.outcome == 'success'
        run: node scripts/healthcheck.mjs
      - name: Check for changes
        id: diff
        if: steps.post.outcome == 'success'
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create Pull Request
        if: >-
          steps.post.outcome == 'success' && steps.diff.outputs.has_changes ==
          'true'
        run: >
          git config --global user.name 'github-actions[bot]'

          git config --global user.email
          'github-actions[bot]@users.noreply.github.com'


          BRANCH_NAME="selfheal-$(date +%s)"

          git checkout -b "$BRANCH_NAME"

          git add -u

          git commit -m "chore: apply self-heal repairs"

          git push -u origin "$BRANCH_NAME"


          if [ "${{ github.event_name }}" == "schedule" ]; then
            TITLE="[Self-Heal Scheduled] Drift fixes"
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
            TITLE="[Self-Heal Reactive] CI fix"
          else
            TITLE="[Self-Heal Manual] Repair"
          fi


          # Read schedule information
          SCHEDULE="unknown"
          RATIONALE="unknown"
          if [ -f .github/self-heal-schedule.yml ]; then
            SCHEDULE=$(grep "^schedule:" .github/self-heal-schedule.yml | cut -d":" -f2- | xargs || echo "unknown")
            RATIONALE=$(grep "^rationale:" .github/self-heal-schedule.yml | cut -d":" -f2- | xargs || echo "unknown")
          fi

          gh pr create \
            --title "$TITLE" \
            --body "Automated self-heal repair triggered by \`${{ github.event_name }}\`.

            **Context:**
            - Link back to chat: [Claude Code / Jules Chat]
            - Current Schedule: \`$SCHEDULE\`
            - Rationale: $RATIONALE
            - Trigger Reason: Automatic repair pipeline finding drift/failures.

            **Artifact Logs:**
            - Review the action run logs for pre/post healthcheck details.

            **Reviewer Checklist:**
            - [ ] The changes make sense and correctly resolve the drift/failure.
            - [ ] No unintended side effects or regressions are introduced.
            - [ ] Tests still pass locally." \
            --label "automation,self-heal" \
            --head "$BRANCH_NAME" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
