name: Self-Heal Repair

on:
  schedule:
    - cron: '0 0 * * 0' # AUTO-UPDATED
  workflow_run:
    workflows: ["ci"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # GATE checks:
    # 1. Skip on non-default branches for scheduled triggers.
    # 2. Prevent loops (branch doesn't start with 'selfheal-').
    # 3. Only run on ci failure if triggered by workflow_run.
    if: >
      !startsWith(github.ref_name, 'selfheal-') &&
      (github.event_name != 'schedule' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'failure')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Stale PR Cleanup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close old self-heal PRs older than 7 days
          SEVEN_DAYS_AGO=$(date -d "7 days ago" +%Y-%m-%d)
          gh pr list --label "self-heal" --search "created:<$SEVEN_DAYS_AGO" --state open --json number --jq '.[].number' | while read pr_num; do
            gh pr close "$pr_num" -c "Closing stale self-heal PR."
          done || true

      - name: Check for duplicate Self-Heal PRs
        id: check_duplicate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_COUNT=$(gh pr list --label "self-heal" --state open --json number --jq 'length')
          if [ "$PR_COUNT" -gt "0" ]; then
            echo "Duplicate self-heal PRs found. Skipping repair."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine Trigger Source & Setup Variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "pr_title=[Self-Heal Scheduled] Drift fixes" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "pr_title=[Self-Heal Reactive] CI fix" >> $GITHUB_OUTPUT
          else
            echo "pr_title=[Self-Heal Manual] Repair" >> $GITHUB_OUTPUT
          fi

          # Unique branch name based on run ID
          echo "branch_name=selfheal-repair-${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Run Self-Heal Script
        id: repair_script
        if: steps.check_duplicate.outputs.skip == 'false'
        run: |
          # Make scripts executable
          chmod +x scripts/healthcheck.mjs scripts/self_heal.mjs

          # Run self-heal.mjs (exits 0 ONLY if successful repair + diff)
          node scripts/self_heal.mjs || echo "repair_failed=true" >> $GITHUB_OUTPUT

      - name: Check Diff & Entropy (Secrets Scan)
        id: verify_gate
        if: steps.check_duplicate.outputs.skip == 'false' && steps.repair_script.outputs.repair_failed != 'true'
        run: |
          git status --porcelain

          # Stage allowed files explicitly to prevent staging secrets/forbidden paths
          for path in src/ tests/ scripts/ package.json package-lock.json snapshots/; do
            git add "$path" 2>/dev/null || true
          done

          # Check for basic entropy/secret patterns in diff
          if git diff --cached | grep -iE "(password|secret|api_key|token|auth).*="; then
             echo "Possible secrets detected in diff. Aborting."
             exit 1
          fi

          if [ -z "$(git status --porcelain)" ]; then
             echo "No allowed changes to commit. Aborting."
             exit 1
          fi

      - name: Create PR
        if: steps.check_duplicate.outputs.skip == 'false' && steps.repair_script.outputs.repair_failed != 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "Auto-repaired code drift"
          git branch "${{ steps.vars.outputs.branch_name }}"
          git push origin "${{ steps.vars.outputs.branch_name }}"

          gh pr create \
            --title "${{ steps.vars.outputs.pr_title }}" \
            --body "Automated repair generated by the Self-Heal pipeline.

            **Trigger:** ${{ github.event_name }}

            Please review the changes. The pipeline has run all health checks (lint, types, tests, build) and verified that the project is in a healthy state.

            If this PR is merged, the system will continue to learn and adapt its scheduling logic." \
            --label "automation,self-heal" \
            --head "${{ steps.vars.outputs.branch_name }}" \
            --base "${{ github.event.repository.default_branch }}"
