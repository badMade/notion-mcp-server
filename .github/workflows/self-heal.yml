name: Self-Heal Repair

on:
  schedule:
    # AUTO-UPDATED
    - cron: "0 0 * * 1"
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  repair:
    # Only run on default branch, prevent loops from selfheal branches, and react correctly to CI failures
    if: >
      github.ref_name == 'main' &&
      !startsWith(github.ref_name, 'selfheal-') &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Run Self-Heal Pipeline
        id: repair
        run: |
          chmod +x scripts/self_heal.mjs
          node scripts/self_heal.mjs
        continue-on-error: true

      - name: Check Git Status
        id: git-check
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_diff=true" >> $GITHUB_OUTPUT
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.repair.outcome == 'success' && steps.git-check.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine trigger type for PR title
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            PR_TITLE="[Self-Heal Scheduled] Drift fixes"
            TRIGGER_REASON="Proactive schedule run"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            PR_TITLE="[Self-Heal Reactive] CI fix"
            TRIGGER_REASON="Reactive fix for CI failure in run ${{ github.event.workflow_run.id }}"
          else
            PR_TITLE="[Self-Heal Manual] Repair"
            TRIGGER_REASON="Manual dispatch triggered repair"
          fi

          # Avoid duplicate PRs
          OPEN_PRS=$(gh pr list --label self-heal --state open --json number --jq 'length')
          if [[ "$OPEN_PRS" -gt "0" ]]; then
            echo "Open self-heal PR already exists. Skipping creation to prevent duplicate."
            exit 0
          fi

          BRANCH_NAME="selfheal-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit allowed file types/paths
          git add package.json package-lock.json src/ scripts/ tests/
          git commit -m "Auto-repair via Self-Heal Pipeline"
          git checkout -b "$BRANCH_NAME"
          git push -u origin "$BRANCH_NAME"

          PR_BODY="### Self-Heal Auto-Repair
          **Trigger Reason:** $TRIGGER_REASON

          This PR was generated by the self-healing CI pipeline. Please review the changes before merging.

          _Generated by Claude Code / Jules Automation_"

          gh pr create --title "$PR_TITLE" --body "$PR_BODY" --label "self-heal,automation" --head "$BRANCH_NAME" --base main
