name: Self-Heal Pipeline

on:
  schedule:
    - cron: "0 0 * * *" # AUTO-UPDATED
  workflow_run:
    workflows: ["ci"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    if: >
      github.repository == 'makenotion/notion-mcp-server' &&
      !startsWith(github.ref_name, 'selfheal-') &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'failure')
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Cleanup Stale PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STALE_DATE=$(date -d "7 days ago" +%Y-%m-%dT%H:%M:%SZ)
          STALE_PRS=$(gh pr list --label self-heal --search "created:<$STALE_DATE" --json number -q '.[].number')
          for PR in $STALE_PRS; do
            gh pr close $PR --comment "Closing stale self-heal PR"
          done

      - name: Check for duplicate PRs
        id: check-dupe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PR=$(gh pr list --label self-heal --state open --json createdAt -q '.[0].createdAt')
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
            echo "A self-heal PR is already open. Skipping execution."
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        if: env.SKIP != 'true'
        run: npm ci

      - name: Run Pre-check
        if: env.SKIP != 'true'
        run: node scripts/healthcheck.mjs > pre-check.log 2>&1 || true

      - name: Run Self-Heal Pipeline
        id: repair-step
        if: env.SKIP != 'true'
        run: node scripts/self_heal.mjs > repair.log 2>&1

      - name: Run Post-check
        if: env.SKIP != 'true'
        run: node scripts/healthcheck.mjs > post-check.log 2>&1 || true

      - name: Check for changes and secrets
        id: git-check
        if: env.SKIP != 'true' && steps.repair-step.outcome == 'success'
        run: |
          if git diff --cached --quiet && git diff --quiet; then
             echo "No diff found."
             echo "HAS_DIFF=false" >> $GITHUB_ENV
             exit 0
          fi

          # Stage allowed files
          for path in src/ tests/ scripts/ package.json package-lock.json eslint.config.mjs; do
            git add "$path" 2>/dev/null || true
          done

          # Secret scanning - using -iE and no escape on pipe
          if git diff --cached | grep -iE "apikey|secret|token|password|bearer" > /dev/null; then
             echo "Entropy/Secrets detected in diff! Aborting."
             exit 1
          fi

          echo "HAS_DIFF=true" >> $GITHUB_ENV

      - name: Commit and Create PR
        if: env.SKIP != 'true' && env.HAS_DIFF == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="selfheal-$(date +%s)"
          git checkout -b "$BRANCH_NAME"

          git commit -m "Automated repair by Self-Heal Pipeline"
          git push -u origin "$BRANCH_NAME"

          if [ "${{ github.event_name }}" == "schedule" ]; then
            TITLE="[Self-Heal Scheduled] Drift fixes"
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
            TITLE="[Self-Heal Reactive] CI fix"
          else
            TITLE="[Self-Heal Manual] Repair"
          fi

          gh pr create \
            --title "$TITLE" \
            --body "Automated repair generated by the Self-Heal Pipeline. Please review changes and logs." \
            --label "self-heal" \
            --label "automation"

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-heal-logs
          path: "*.log"
          retention-days: 7
