name: Self-Heal Auto Repair

on:
  schedule:
    - cron: '0 0 * * 0' # AUTO-UPDATED
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      !startsWith(github.ref_name, 'selfheal-') &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'))

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Close Stale PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STALE_DATE=$(date -d "7 days ago" +%Y-%m-%d)
          STALE_PRS=$(gh pr list --label self-heal --search "created:<$STALE_DATE" --json number -q '.[].number')
          for pr in $STALE_PRS; do
            gh pr close $pr --comment "Auto-closing stale self-heal PR"
          done

      - name: Check for recent open duplicate PRs
        id: check_duplicate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PR=$(gh pr list --label self-heal --state open --json createdAt -q '.[0].createdAt')
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
             echo "Duplicate open PR found. Skipping repair."
             echo "SKIP=true" >> $GITHUB_ENV
          else
             echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Pre-Healthcheck
        if: env.SKIP != 'true'
        id: pre_healthcheck
        run: node scripts/healthcheck.mjs > pre-check.log 2>&1 || echo "PRE_FAILED=true" >> $GITHUB_ENV

      - name: Run Self-Healing Repair
        if: env.SKIP != 'true'
        run: |
          node scripts/self_heal.mjs > repair.log 2>&1 || true

      - name: Post-Healthcheck (Gatekeeper)
        if: env.SKIP != 'true'
        id: post
        run: node scripts/healthcheck.mjs > post-check.log 2>&1

      - name: Check Diff & Entropy/Secrets
        if: env.SKIP != 'true' && steps.post.outcome == 'success'
        id: check_diff
        run: |
          git add -A
          # Exclude lockfiles from entropy scan
          if git diff --cached --quiet; then
            echo "No diff. Exiting gracefully."
            echo "HAS_DIFF=false" >> $GITHUB_ENV
            exit 0
          fi

          # Entropy scan
          if git diff --cached -U0 -- ':!package-lock.json' | grep -iE '(password|secret|api_key|token|bearer|auth|key).*[=:]'; then
             echo "Secret or entropy pattern detected in diff! Aborting."
             exit 1
          fi

          echo "HAS_DIFF=true" >> $GITHUB_ENV

      - name: Create Pull Request
        if: env.SKIP != 'true' && env.HAS_DIFF == 'true' && steps.post.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="selfheal-repair-$(date +%s)"
          git checkout -b $BRANCH_NAME

          git commit -m "Auto-repair changes via self-heal workflow"
          git push -u origin $BRANCH_NAME

          TITLE="[Self-Heal Reactive] CI fix"
          if [ "${{ github.event_name }}" == "schedule" ]; then
             TITLE="[Self-Heal Scheduled] Drift fixes"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
             TITLE="[Self-Heal Manual] Repair"
          fi

          BODY="Automated repair generated by the Self-Heal workflow.

          **Trigger:** ${TITLE}
          **Drift Summary:** The pipeline detected and automatically fixed state drift (e.g. lockfiles, formatting, snapshots).

          **Reviewer Actions:**
          1. Review the generated diff below.
          2. Inspect the pre/post-check artifacts in the Actions run for context.

          _Link back to Claude Code / Jules context: Not applicable/Provided by user._"

          gh pr create --title "$TITLE" --body "$BODY" --label "automation,self-heal"

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-heal-logs
          path: |
            pre-check.log
            repair.log
            post-check.log
