name: Self-Heal Repair Pipeline

on:
  schedule:
    - cron: "0 0 * * *" # AUTO-UPDATED
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == 'main')
    timeout-minutes: 15
    steps:
      - name: Guard against running on selfheal branches
        if: startsWith(github.ref_name, 'selfheal-')
        run: |
          echo "SKIP=true" >> $GITHUB_ENV

      - name: Checkout repository
        if: env.SKIP != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: env.SKIP != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cleanup stale PRs
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STALE_DATE=$(date -d "7 days ago" +%Y-%m-%d)
          STALE_PRS=$(gh pr list --label self-heal --search "created:<$STALE_DATE" --json number -q '.[].number')
          for PR in $STALE_PRS; do
            gh pr close "$PR" --comment "Auto-closing stale self-heal PR."
          done

      - name: Check for duplicate PRs
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PR=$(gh pr list --label self-heal --state open --json createdAt -q '.[0].createdAt')
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
            echo "Open selfheal PR found. Skipping repair."
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Run pre-healthcheck
        if: env.SKIP != 'true'
        run: |
          npm ci
          node scripts/healthcheck.mjs > pre-check.log 2>&1 || true

      - name: Run self-healing repair steps
        if: env.SKIP != 'true'
        run: |
          node scripts/self_heal.mjs

      - name: Check diff
        if: env.SKIP != 'true'
        id: check_diff
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes found. Exiting."
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Secret Scanning Gate
        if: env.SKIP != 'true'
        run: |
          git add .
          if git diff --cached | grep -iE '(api[_-]?key|secret|token|password)'; then
            echo "Potential secrets found in diff! Aborting."
            echo "SKIP=true" >> $GITHUB_ENV
            git reset
          fi

      - name: Check Forbidden Paths Gate
        if: env.SKIP != 'true'
        run: |
          git reset
          FORBIDDEN_FILES=$(git ls-files -m | grep -E "^(.env|secrets/|.github/workflows/ci.yml)$" || true)
          if [ ! -z "$FORBIDDEN_FILES" ]; then
            echo "Forbidden files modified! Aborting."
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Prepare Commit
        if: env.SKIP != 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Only add allowed paths (dynamic)
          find . -type f -not -path '*/\.git/*' -not -path '*/node_modules/*' -not -path '*/\.env*' -not -path '*/secrets/*' -not -path '*/\.github/workflows/ci.yml' | while read path; do
            git add "$path" 2>/dev/null || true
          done

          if git diff --cached --quiet; then
            echo "No allowed files staged. Exiting."
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Determine PR Title
        if: env.SKIP != 'true'
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "PR_TITLE=[Self-Heal Scheduled] Drift fixes" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "PR_TITLE=[Self-Heal Reactive] CI fix" >> $GITHUB_ENV
          else
            echo "PR_TITLE=[Self-Heal Manual] Repair" >> $GITHUB_ENV
          fi

      - name: Create Pull Request
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="selfheal-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          git commit -m "Auto-repair: $PR_TITLE"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "$PR_TITLE" \
            --body "Automated repair generated by the Self-Heal Coding Agent. Check artifacts for logs." \
            --label "self-heal" \
            --label "automation"

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-heal-logs
          path: |
            pre-check.log
            repair.log
            post-check.log
