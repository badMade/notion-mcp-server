name: Self-Heal Pipeline

on:
  schedule:
    - cron: '0 3 * * 1' # AUTO-UPDATED
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      (github.event_name == 'schedule' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure') ||
      (github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for duplicate PRs
        id: check_pr
        run: |
          RECENT_PR=$(gh pr list --label self-heal --state open --json createdAt -q '.[0].createdAt' || echo "null")
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
            echo "SKIP=true" >> $GITHUB_ENV
            echo "An open self-heal PR already exists. Skipping."
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Loop Prevention Check
        if: env.SKIP != 'true'
        run: |
          if [[ "${{ github.ref_name }}" == selfheal-* ]]; then
            echo "SKIP=true" >> $GITHUB_ENV
            echo "Branch name starts with selfheal-. Preventing loop."
          fi

      - name: Cleanup Stale PRs
        if: env.SKIP != 'true'
        run: |
          # Close self-heal PRs older than 7 days (604800 seconds)
          OLD_PRS=$(gh pr list --label self-heal --state open --json number,createdAt --jq '.[] | select((now - (.createdAt | fromdateiso8601)) > 604800) | .number' || true)
          for pr in $OLD_PRS; do
            gh pr close $pr -c "Auto-closing stale self-heal PR" || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Initial Healthcheck
        if: env.SKIP != 'true'
        run: |
          chmod +x scripts/healthcheck.mjs
          node scripts/healthcheck.mjs > pre-check.log 2>&1 || echo "Healthcheck failed as expected"
        continue-on-error: true

      - name: Run Self-Heal Pipeline
        id: repair
        if: env.SKIP != 'true'
        run: |
          chmod +x scripts/self_heal.mjs
          node scripts/self_heal.mjs > repair.log 2>&1

      - name: Run Final Healthcheck
        id: post
        if: env.SKIP != 'true'
        run: |
          node scripts/healthcheck.mjs > post-check.log 2>&1

      - name: Check Git Entropy / Secrets
        if: env.SKIP != 'true' && steps.post.outcome == 'success'
        run: |
          git add -A
          # Exclude package-lock.json from secret scanning false positives
          if git diff --cached -U0 -- ':!package-lock.json' | grep -iE '(secret|password|token|api_key|apikey)'; then
            echo "Possible secrets detected in diff. Aborting."
            exit 1
          fi

      - name: Check Allowed Files
        if: env.SKIP != 'true' && steps.post.outcome == 'success'
        run: |
          git add -A
          # Only allow changes in specific directories
          if git diff --cached --name-only | grep -E "^(.github/workflows/ci.yml|.env|secrets/|src/.*/migrations/)"; then
            echo "Changes detected in forbidden files. Aborting."
            exit 1
          fi

      - name: Commit and Create PR
        if: env.SKIP != 'true' && steps.post.outcome == 'success'
        run: |
          if git diff --cached --quiet; then
            echo "No changes to commit. Exiting."
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="selfheal-repair-$(date +%s)"
          git checkout -b $BRANCH_NAME
          git commit -m "Auto-repair: Resolving CI and drift failures"
          git push origin $BRANCH_NAME

          TITLE="[Self-Heal Manual] Repair"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            TITLE="[Self-Heal Scheduled] Drift fixes"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            TITLE="[Self-Heal Reactive] CI fix"
          fi

          BODY="## Self-Heal Automation Repair\n\nThis PR was generated by the self-heal pipeline triggered via \`${{ github.event_name }}\`.\n\nPlease review the artifact logs for pre-check and repair details.\n\n[Link back to the Jules chat that generated this automation]"

          gh pr create --title "$TITLE" --body "$BODY" --label "self-heal" --label "automation" --head $BRANCH_NAME
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-heal-logs
          path: |
            pre-check.log
            repair.log
            post-check.log
