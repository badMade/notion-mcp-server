name: Self-Heal Auto-Repair

on:
  schedule:
    - cron: '0 0 * * *' # AUTO-UPDATED
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Gate: Ensure it runs on default branch and not in a selfheal-* loop
    # If scheduled, only run on default branch
    if: >-
      !startsWith(github.ref_name, 'selfheal-') &&
      (
        github.event_name != 'workflow_run' ||
        github.event.workflow_run.conclusion == 'failure'
      )
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Self-Heal Pipeline
        id: repair
        continue-on-error: true
        run: |
          # Close stale selfheal PRs (older than 7 days)
          gh pr list --label self-heal --state open --json number,createdAt | jq -r '.[] | select((now - (.createdAt | fromdateiso8601)) > 604800) | .number' | xargs -I {} gh pr close {} -c "Closing stale selfheal PR" || true

          # Run the self heal script (exits 0 if passes healthcheck AND has diff)
          node scripts/self_heal.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR Gate Checks
        id: checks
        if: steps.repair.outcome == 'success'
        run: |
          # Ensure there is a non-empty diff
          git add .
          if [ -z "$(git diff --cached --porcelain)" ]; then
            echo "No diff found. Stopping here."
            exit 0
          fi

          # Scan for secrets in diff
          if ! git diff --cached | grep -iE '(secret|password|api_key|token)'; then
            echo "Secrets check passed."
          else
            echo "Found forbidden pattern (secret/password/key/token) in diff. Failing gate."
            exit 1
          fi

          # Check allowed paths
          # Deny changes to CI workflows and .env
          if git diff --cached --name-only | grep -E '^(\.github/workflows/ci\.yml|\.env|secrets/)'; then
            echo "Changes modified forbidden paths. Failing gate."
            exit 1
          fi

          echo "gate_passed=true" >> $GITHUB_OUTPUT

      - name: Create PR
        if: steps.repair.outcome == 'success' && steps.checks.outputs.gate_passed == 'true'
        run: |
          # Determine title based on trigger
          if [ "${{ github.event_name }}" = "schedule" ]; then
            PR_TITLE="[Self-Heal Scheduled] Drift fixes"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            PR_TITLE="[Self-Heal Reactive] CI fix"
          else
            PR_TITLE="[Self-Heal Manual] Repair"
          fi

          # Check for duplicate open PRs
          OPEN_PRS=$(gh pr list --label self-heal --state open --json number | jq length)
          if [ "$OPEN_PRS" -gt 0 ]; then
            echo "An open selfheal PR already exists. Skipping creation to avoid duplicates."
            exit 0
          fi

          BRANCH_NAME="selfheal-$(date +%s)"
          git checkout -b $BRANCH_NAME
          git commit -m "Auto-repair drift/ci failure"

          # The system blocks "git push origin branch", we must use gh pr create and token
          git push origin $BRANCH_NAME

          cat << 'EOF' > pr_body.txt
          ## Self-Heal Auto Repair
          This PR was automatically generated by the Self-Heal Coding Agent.

          **Trigger reason:** ${{ github.event_name }}

          Please review the changes. The pipeline has confirmed that healthchecks pass after these modifications.
          EOF

          gh pr create --title "$PR_TITLE" --body-file pr_body.txt --label "self-heal,automation"
        env:
          GH_TOKEN: ${{ secrets.PAT_WITH_WORKFLOW_SCOPE || secrets.GITHUB_TOKEN }}
