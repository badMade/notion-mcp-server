name: Self-Heal Pipeline

on:
  schedule:
    - cron: "0 0 * * *" # AUTO-UPDATED
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  repair:
    if: >
      !startsWith(github.ref_name, 'selfheal-') &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stale PR Cleanup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Cleanup PRs older than 7 days
          STALE_DATE=$(date -d "7 days ago" +%Y-%m-%d)
          STALE_PRS=$(gh pr list --label self-heal --search "created:<$STALE_DATE" --state open --json number -q '.[].number')
          for pr in $STALE_PRS; do
             gh pr close $pr -c "Auto-closing stale self-heal PR"
          done

      - name: Check for duplicate PRs
        id: precheck
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PR=$(gh pr list --label self-heal --state open --json createdAt -q '.[0].createdAt')
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
             echo "Duplicate open PR found. Skipping."
             echo "skip=true" >> "$GITHUB_OUTPUT"
          else
             echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Initial Healthcheck
        if: steps.precheck.outputs.skip != 'true'
        run: node scripts/healthcheck.mjs > pre-check.log 2>&1 || true

      - name: Run Self-Heal Pipeline
        id: heal
        if: steps.precheck.outputs.skip != 'true'
        run: node scripts/self_heal.mjs > repair.log 2>&1

      - name: Post Healthcheck
        if: steps.precheck.outputs.skip != 'true'
        run: node scripts/healthcheck.mjs > post-check.log 2>&1

      - name: Verify file changes restrictions
        if: steps.precheck.outputs.skip != 'true'
        run: |
          ALLOWED="src/ tests/ scripts/ package.json package-lock.json eslint.config.mjs"
          FORBIDDEN=".github/workflows/ci.yml .env secrets/"

          # Reject if any forbidden path is modified
          for path in $FORBIDDEN; do
             if git diff --name-only | grep -q "$path"; then
                echo "Forbidden path modified: $path. Aborting."
                exit 1
             fi
          done

          # Stage allowed files safely
          for path in $ALLOWED; do
             git add "$path" 2>/dev/null || true
          done

          # Entropy scan for secrets
          if git diff --cached | grep -iE '(api_key|secret|token|password)[ =]*[a-zA-Z0-9_-]{20,}'; then
             echo "Possible secret exposed. Aborting."
             exit 1
          fi

          if git diff --cached --quiet; then
             echo "No allowed changes to commit. Exiting."
             # Record empty run
             echo "empty_run=true" >> "$GITHUB_OUTPUT"
             exit 0
          fi

      - name: Create PR
        if: steps.precheck.outputs.skip != 'true' && steps.heal.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --cached --quiet; then
             exit 0
          fi

          BRANCH_NAME="selfheal-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          git commit -m "chore(self-heal): automated repair pipeline"
          git push -u origin "$BRANCH_NAME"

          TITLE="[Self-Heal] Auto-repair"
          if [ "${{ github.event_name }}" == "schedule" ]; then
             TITLE="[Self-Heal Scheduled] Drift fixes"
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
             TITLE="[Self-Heal Reactive] CI fix"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
             TITLE="[Self-Heal Manual] Repair"
          fi

          gh pr create --title "$TITLE" --body "Automated repair pipeline executed.
          Please review the attached logs in the artifact.
          Trigger: ${{ github.event_name }}
          " --label self-heal,automation

      - name: Annotate consecutive failures
        if: failure() && github.event_name == 'schedule'
        run: |
          echo "::warning title=Self-Heal Scheduled Failure::Self-heal failed during a scheduled run."

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-heal-logs
          path: |
            pre-check.log
            repair.log
            post-check.log
