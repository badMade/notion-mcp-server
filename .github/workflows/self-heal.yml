name: Self-Heal Auto-Repair

on:
  schedule:
    - cron: '0 3 * * *' # AUTO-UPDATED
  workflow_run:
    workflows: ["ci"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref_name, 'selfheal-')"
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine PR Title based on trigger
        id: pr_title
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "title=[Self-Heal Scheduled] Drift fixes" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "failure" ]; then
              echo "CI passed, no need to repair."
              exit 0
            fi
            echo "title=[Self-Heal Reactive] CI fix" >> $GITHUB_OUTPUT
          else
            echo "title=[Self-Heal Manual] Repair" >> $GITHUB_OUTPUT
          fi

      - name: Check for Existing PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_PRS=$(gh pr list --label self-heal --state open --json number -q 'length')
          if [ "$OPEN_PRS" -gt 0 ]; then
             echo "An open selfheal PR already exists. Exiting to prevent duplicate PRs."
             exit 0
          fi

      - name: Cleanup Stale PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close selfheal PRs older than 7 days
          gh pr list --label self-heal --state open --json number,createdAt | jq -c '.[]' | while read pr; do
            CREATED_AT=$(echo $pr | jq -r '.createdAt')
            NUMBER=$(echo $pr | jq -r '.number')

            # Simple threshold check (could be refined depending on OS utils)
            AGE_DAYS=$(( ( $(date +%s) - $(date -d "$CREATED_AT" +%s) ) / 86400 ))
            if [ "$AGE_DAYS" -gt 7 ]; then
              gh pr close "$NUMBER" --comment "Auto-closing stale self-heal PR older than 7 days."
            fi
          done || true

      - name: Run Self-Heal script
        id: repair
        run: |
          node scripts/self_heal.mjs

      - name: Verify Health
        id: healthcheck
        if: steps.repair.outcome == 'success'
        run: |
          node scripts/healthcheck.mjs

      - name: Check for Diff and Validate Scope
        id: diff_check
        if: steps.healthcheck.outcome == 'success'
        run: |
          git add -A

          # Entropy scan for secrets (fail step if found)
          ! git diff --cached | grep -iE '(secret)'

          # Check for non-empty diff
          if [ -z "$(git status --porcelain)" ]; then
            echo "diff_exists=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "diff_exists=true" >> $GITHUB_OUTPUT

          # Scope validation (only allow specific directories/files)
          FORBIDDEN_CHANGES=$(git diff --cached --name-only | grep -E "^(.github/workflows/ci.yml|.env|secrets/|src/.*/migrations/)" || true)
          if [ -n "$FORBIDDEN_CHANGES" ]; then
             echo "Error: Allowed repair scope violated. Forbidden files modified: $FORBIDDEN_CHANGES"
             exit 1
          fi

      - name: Create Pull Request
        if: steps.diff_check.outputs.diff_exists == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="selfheal-repair-$(date +%s)"
          git checkout -b $BRANCH_NAME
          git commit -m "Auto-repair by self-heal pipeline"
          git push origin $BRANCH_NAME

          gh pr create --title "${{ steps.pr_title.outputs.title }}" --body "Automated repair generated by the self-heal pipeline.

          **Trigger:** ${{ github.event_name }}
          **Current Schedule:** \`$(grep schedule .github/self-heal-schedule.yml | cut -d' ' -f2-)\`

          Please review the changes carefully." --label "automation,self-heal"
