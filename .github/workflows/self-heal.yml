name: Self-Heal CI

on:
  schedule:
    - cron: '0 0 * * *' # AUTO-UPDATED
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: "!startsWith(github.ref_name, 'selfheal-') && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'failure') && (github.event_name != 'schedule' || github.ref == 'refs/heads/main')"
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cleanup Stale PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close self-heal PRs older than 7 days
          SEVEN_DAYS_AGO=$(date -d "7 days ago" -u +"%Y-%m-%dT%H:%M:%SZ")
          STALE_PRS=$(gh pr list --label "self-heal" --search "created:<$SEVEN_DAYS_AGO" --json number -q '.[].number')
          for pr in $STALE_PRS; do
            gh pr close $pr --comment "Closing stale self-heal PR."
          done || true

      - name: Check Duplicate Open PR
        id: check-dup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PR=$(gh pr list --label "self-heal" --state open --json createdAt -q '.[0].createdAt')
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
            echo "duplicate=true" >> $GITHUB_OUTPUT
            echo "A self-heal PR already exists. Aborting."
          else
            echo "duplicate=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Self-Heal Script
        if: steps.check-dup.outputs.duplicate == 'false'
        id: repair
        run: |
          node scripts/self_heal.mjs || exit 1

      - name: Check for Entropy (Secrets)
        if: steps.check-dup.outputs.duplicate == 'false' && success()
        run: |
          # Use grep -iE to ensure safe extended regex.
          git diff > unstaged_diff.patch
          if grep -iE "apikey|api_key|token|secret|password" unstaged_diff.patch; then
            echo "Entropy pattern detected in diff! Aborting."
            exit 1
          fi

      - name: Upload Repair Artifacts
        if: always() && steps.check-dup.outputs.duplicate == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: self-heal-logs
          path: |
            pre-check.log
            repair.log
            post-check.log
          retention-days: 7

      - name: Stage Changes
        if: steps.check-dup.outputs.duplicate == 'false' && success()
        run: |
          # Avoid git add -A, scope only to specific directories.
          for path in src/ tests/ package.json package-lock.json; do
            git add "$path" 2>/dev/null || true
          done

      - name: Create Pull Request
        if: steps.check-dup.outputs.duplicate == 'false' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only create PR if there's an actual staged diff
          if ! git diff --cached --quiet; then
            BRANCH_NAME="selfheal-repair-$(date +%s)"
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b $BRANCH_NAME
            git commit -m "Automated self-heal codebase repairs"
            git push origin $BRANCH_NAME

            # Determine title based on trigger
            EVENT="${{ github.event_name }}"
            if [ "$EVENT" = "schedule" ]; then
              PR_TITLE="[Self-Heal Scheduled] Drift fixes"
            elif [ "$EVENT" = "workflow_run" ]; then
              PR_TITLE="[Self-Heal Reactive] CI fix"
            else
              PR_TITLE="[Self-Heal Manual] Repair"
            fi

            # Read current schedule for PR body
            CURRENT_SCHEDULE=$(cat .github/self-heal-schedule.yml || echo "Unknown")

            PR_BODY="### Automated Codebase Repair\n\nTrigger: $EVENT\n\nThis PR was generated by the Self-Heal CI pipeline. Review the uploaded artifact logs for detailed repair steps.\n\n<details><summary>Current Schedule Configuration</summary>\n\n\`\`\`yaml\n$CURRENT_SCHEDULE\n\`\`\`\n</details>"

            gh pr create --title "$PR_TITLE" --body "$PR_BODY" --label "self-heal" --label "automation" --head $BRANCH_NAME --base main
          fi
