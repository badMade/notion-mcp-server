name: Self-Heal Repair

on:
  schedule:
    - cron: '0 2 1 * *' # AUTO-UPDATED
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      !startsWith(github.ref_name, 'selfheal-') &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'failure')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Check for duplicate PRs
      - name: Cleanup stale PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STALE_DATE=$(date -d "7 days ago" +%Y-%m-%d)
          gh pr list --label self-heal --search "created:<$STALE_DATE" --state open --json number --jq ".[].number" | while read -r pr_num; do
            if [ ! -z "$pr_num" ]; then
              gh pr close "$pr_num" -c "Auto-closing stale self-heal PR"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PR=$(gh pr list --label self-heal --state open --json createdAt --jq '.[0].createdAt' || echo "null")
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
            echo "Duplicate self-heal PR is already open. Skipping run."
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Run Self-Heal Pipeline
        if: env.SKIP != 'true'
        run: node scripts/self_heal.mjs > repair.log 2>&1

      - name: Set PR Title based on trigger
        if: env.SKIP != 'true'
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "PR_TITLE=[Self-Heal Scheduled] Drift fixes" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "PR_TITLE=[Self-Heal Reactive] CI fix" >> $GITHUB_ENV
          else
            echo "PR_TITLE=[Self-Heal Manual] Repair" >> $GITHUB_ENV
          fi

      - name: Gate check (file modifications)
        if: env.SKIP != 'true'
        run: |
          # Only proceed if changes are allowed
          git diff --name-only > changes.txt
          FORBIDDEN=$(grep -E '^\.env$|^secrets/|^\.github/workflows/ci\.yml$' changes.txt || true)
          if [ ! -z "$FORBIDDEN" ]; then
            echo "Forbidden files modified! Aborting."
            exit 1
          fi

      - name: Create PR
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit. Exiting."
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="selfheal-$(date +%s)"
          git checkout -b "$BRANCH_NAME"

          # Stage allowed files carefully
          for path in src/ tests/ scripts/ package.json package-lock.json eslint.config.mjs; do
            git add "$path" 2>/dev/null || true
          done

          if git diff --cached --quiet; then
            echo "No allowed files modified. Exiting."
            exit 0
          fi

          git commit -m "${{ env.PR_TITLE }}"
          git push -u origin "$BRANCH_NAME"

          gh pr create \
            --title "${{ env.PR_TITLE }}" \
            --body "Automated repair generated by the Self-Heal Pipeline. Please review the attached artifact logs.\n\nThis PR was generated by an automated self-healing CI pipeline. See the [Claude Code chat](.) for context." \
            --label "self-heal" \
            --label "automation"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-heal-logs
          path: repair.log
