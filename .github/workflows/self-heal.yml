name: Self-Heal Repair Pipeline

on:
  schedule:
    - cron: '0 0 * * *' # AUTO-UPDATED
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  repair:
    if: >
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Close Stale PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close PRs older than 7 days
          STALE_DATE=$(date -d "7 days ago" -I)
          gh pr list --label self-heal --state open --search "created:<$STALE_DATE" --json number --jq '.[].number' | while read pr; do
            gh pr close "$pr" -c "Closing stale self-heal PR"
          done

      - name: Check for Duplicate Open PRs
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_PRS=$(gh pr list --label self-heal --state open --json number --jq 'length')
          if [ "$OPEN_PRS" -gt 0 ]; then
            echo "duplicate_exists=true" >> $GITHUB_OUTPUT
            echo "Found open self-heal PRs. Skipping to prevent duplicates."
          else
            echo "duplicate_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Dependencies
        if: steps.check_pr.outputs.duplicate_exists == 'false'
        run: npm ci

      - name: Run Healthcheck (Pre)
        id: pre_healthcheck
        if: steps.check_pr.outputs.duplicate_exists == 'false'
        run: node scripts/healthcheck.mjs > pre_healthcheck.log 2>&1 || true

      - name: Upload Pre-Healthcheck Log
        if: steps.check_pr.outputs.duplicate_exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: pre_healthcheck-log
          path: pre_healthcheck.log
          retention-days: 7

      - name: Run Self-Heal Steps
        id: repair
        if: steps.check_pr.outputs.duplicate_exists == 'false'
        run: node scripts/self_heal.mjs > repair.log 2>&1

      - name: Upload Repair Log
        if: steps.check_pr.outputs.duplicate_exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: repair-log
          path: repair.log
          retention-days: 7

      - name: Create PR
        if: steps.repair.outcome == 'success' && !startsWith(github.ref_name, 'selfheal-') && steps.check_pr.outputs.duplicate_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="selfheal-$(date +%s)"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add .
          git commit -m "Auto-repair drift"
          git push -u origin "$BRANCH_NAME"

          if [ "${{ github.event_name }}" == "schedule" ]; then
            TITLE="[Self-Heal Scheduled] Drift fixes"
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
            TITLE="[Self-Heal Reactive] CI fix"
          else
            TITLE="[Self-Heal Manual] Repair"
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Read current schedule and rationale
          CURRENT_SCHEDULE="Unknown"
          RATIONALE="Unknown"
          if [ -f .github/self-heal-schedule.yml ]; then
            CURRENT_SCHEDULE=$(grep "^schedule:" .github/self-heal-schedule.yml | cut -d"'" -f2)
            RATIONALE=$(grep "^rationale:" .github/self-heal-schedule.yml | cut -d" " -f2-)
          fi

          cat << EOF > pr_body.txt
          Automated drift repair.

          **Trigger:** ${{ github.event_name }}
          **Current Schedule:** \`$CURRENT_SCHEDULE\`
          **Rationale:** $RATIONALE

          Review carefully. The pipeline has successfully formatted code, updated snapshots, and verified healthchecks.

          **Logs:** [View Actions Run]($RUN_URL)
          EOF

          gh pr create --title "$TITLE" --body-file pr_body.txt --label "self-heal"
