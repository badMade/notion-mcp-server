name: Self-Heal Repair Pipeline

on:
  schedule:
    - cron: '0 0 * * *' # AUTO-UPDATED
  workflow_run:
    workflows: ["ci"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Loop prevention: do not run if branch starts with 'selfheal-'
    if: >-
      !startsWith(github.ref_name, 'selfheal-') &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'))

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for Duplicate PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PR=$(gh pr list --label self-heal --state open --json createdAt -q '.[0].createdAt' || echo "null")
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
            echo "Open self-heal PR already exists. Skipping run."
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Pre-Healthcheck
        if: env.SKIP != 'true'
        id: pre_healthcheck
        run: |
          if node scripts/healthcheck.mjs; then
            echo "exit_code=0" >> $GITHUB_OUTPUT
          else
            echo "exit_code=1" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Run Repair Pipeline
        if: env.SKIP != 'true'
        id: repair_script
        run: |
          node scripts/self_heal.mjs

      - name: Post-Healthcheck
        if: env.SKIP != 'true'
        id: post_healthcheck
        run: node scripts/healthcheck.mjs

      - name: Stage Allowed Files
        if: env.SKIP != 'true'
        run: |
          # Only stage specific paths
          git add src/ tests/ scripts/ package*.json eslint.config.mjs || true

          # Explicitly unstage forbidden paths
          git reset HEAD .env secrets/ .github/workflows/ci.yml || true

      - name: Entropy & Secret Scan
        if: env.SKIP != 'true'
        run: |
          if ! git diff --cached --quiet; then
             # Fail if any secret pattern is found in the diff
             ! git diff --cached -U0 -- ':!package-lock.json' | grep -iE '(secret|password|token|api_key|apikey|credentials)' || exit 1
          fi

      - name: Check Diff & Commit
        if: env.SKIP != 'true' && steps.post_healthcheck.outcome == 'success'
        id: commit_check
        run: |
          if git diff --cached --quiet; then
            echo "No meaningful changes to commit. Exiting."
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            git commit -m "Auto-repair system drift"
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      - name: Create PR
        if: env.SKIP != 'true' && env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="selfheal-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          git push -u origin "$BRANCH_NAME"

          PR_TITLE=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            PR_TITLE="[Self-Heal Scheduled] Drift fixes"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            PR_TITLE="[Self-Heal Reactive] CI fix"
          else
            PR_TITLE="[Self-Heal Manual] Repair"
          fi

          PR_BODY="This PR was auto-generated by the self-healing CI pipeline.\n\nTrigger: ${{ github.event_name }}\n\nPlease review the changes before merging.\n\nIncludes automated repairs for system drift."

          gh pr create --title "$PR_TITLE" --body "$PR_BODY" --label "self-heal" --label "automation" --base main
