name: Self-Heal Auto-Repair

on:
  schedule:
    - cron: '0 3 * * 1' # AUTO-UPDATED
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref_name, 'selfheal-') && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'failure')"
    timeout-minutes: 15
    steps:
      - name: Check for duplicate PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_PRS=$(gh pr list --label self-heal --state open --json createdAt -q 'length' || echo "0")
          if [ "$OPEN_PRS" -gt "0" ]; then
            echo "SKIP=true" >> $GITHUB_ENV
            echo "An open self-heal PR already exists. Skipping repair."
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Checkout code
        if: env.SKIP != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: env.SKIP != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS-YAML locally for script
        if: env.SKIP != 'true'
        run: npm ci

      - name: Pre-healthcheck
        if: env.SKIP != 'true'
        id: pre
        run: |
          node scripts/healthcheck.mjs
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run Self-Heal Repair Pipeline
        if: env.SKIP != 'true'
        run: |
          node scripts/self_heal.mjs

      - name: Post-healthcheck
        if: env.SKIP != 'true'
        id: post
        run: |
          node scripts/healthcheck.mjs

      - name: Check Diff & Entropy
        if: env.SKIP != 'true' && steps.post.outcome == 'success'
        id: diff
        run: |
          git add -A
          # Exclude lockfiles from secret scan to prevent false positives
          ! git diff --cached -U0 -- ':!package-lock.json' | grep -iE '(secret|api_key|token)'
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_diff=true" >> $GITHUB_OUTPUT
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: env.SKIP != 'true' && steps.diff.outputs.has_diff == 'true' && steps.post.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="selfheal-$(date +%s)"
          git checkout -b $BRANCH
          git commit -m "Auto-repair drift and failed healthchecks"
          git push origin $BRANCH

          TITLE="[Self-Heal Reactive] CI fix"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            TITLE="[Self-Heal Scheduled] Drift fixes"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TITLE="[Self-Heal Manual] Repair"
          fi

          gh pr create \
            --title "$TITLE" \
            --body "Automated drift fixes by self-healing pipeline.
Trigger: $TITLE
Schedule Rationale: Check .github/self-heal-schedule.yml
Drift Summary: See committed files.
Logs: Review the workflow run artifacts for full details.

Generated for Claude Code / Jules task." \
            --label "automation,self-heal" \
            --base main
