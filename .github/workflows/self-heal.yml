name: Self-Heal Repair

on:
  schedule:
    - cron: "0 0 * * 1" # AUTO-UPDATED
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      !startsWith(github.ref_name, 'selfheal-') &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'failure') &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Stale PR Cleanup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STALE_DATE=$(date -d "7 days ago" -I)
          STALE_PRS=$(gh pr list --label self-heal --search "created:<$STALE_DATE" --state open --json number -q '.[].number')
          for PR in $STALE_PRS; do
            gh pr close "$PR" -c "Closing stale self-heal PR"
          done

      - name: Check for Duplicate PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_DATE=$(date -d "1 day ago" -I)
          RECENT_PR=$(gh pr list --label self-heal --state open --search "created:>=$RECENT_DATE" --json createdAt -q '.[0].createdAt')
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
            echo "A recent self-heal PR is already open. Skipping repair pipeline."
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Execute Self-Heal Pipeline
        id: repair_step
        if: env.SKIP != 'true'
        run: |
          node scripts/self_heal.mjs > repair.log 2>&1
        continue-on-error: true

      - name: Verify Health and Diff
        id: verify_step
        if: env.SKIP != 'true'
        run: |
          if [ "${{ steps.repair_step.outcome }}" != "success" ]; then
            echo "Repair pipeline did not exit cleanly (no diff or health check failed). Nothing to PR."
            exit 0
          fi

          # Stage allowed files explicitly
          for path in src/ tests/ scripts/ package.json package-lock.json; do
            git add "$path" 2>/dev/null || true
          done

          # Check forbidden paths
          FORBIDDEN=$(git diff --cached --name-only | grep -iE '^\.env|secrets\/|\.github\/workflows\/ci\.yml|migrations\/' || true)
          if [ ! -z "$FORBIDDEN" ]; then
            echo "Forbidden files modified! Aborting."
            exit 1
          fi

          # Scan for secrets in unstaged changes excluding lockfiles
          ENTROPY=$(git diff --cached -U0 -- ':!package-lock.json' | grep -iE 'sk_test|sk_live|password|secret|token' || true)
          if [ ! -z "$ENTROPY" ]; then
            echo "Possible secrets detected in diff! Aborting."
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "No allowed files were changed."
            exit 0
          fi
          echo "HAS_CHANGES=true" >> $GITHUB_ENV

      - name: Create PR
        if: env.SKIP != 'true' && env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="selfheal-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          git commit -m "Auto-repair drift and CI failures"
          git push origin "$BRANCH_NAME"

          TITLE="[Self-Heal Reactive] CI fix"
          if [ "${{ github.event_name }}" == "schedule" ]; then
            TITLE="[Self-Heal Scheduled] Drift fixes"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TITLE="[Self-Heal Manual] Repair"
          fi

          gh pr create \
            --title "$TITLE" \
            --body "Automated self-healing pipeline detected and repaired issues. Review repair logs in artifacts." \
            --label "self-heal" \
            --base main \
            --head "$BRANCH_NAME"

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repair-logs
          path: repair.log
