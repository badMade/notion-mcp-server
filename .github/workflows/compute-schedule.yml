name: Compute Self-Heal Schedule

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: compute-schedule-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Check for existing schedule update PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PR=$(gh pr list --label self-heal-schedule --state open --json createdAt -q '.[0].createdAt')
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
            echo "Open schedule PR found. Skipping computation."
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Run schedule computation
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/compute_schedule.mjs

      - name: Create PR if schedule changed
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No schedule changes. Exiting."
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .github/self-heal-schedule.yml .github/workflows/self-heal.yml

          BRANCH_NAME="schedule-update-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          git commit -m "Auto-update self-heal schedule"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "[Self-Heal Schedule] Update cadence" \
            --body "Automated update to the self-healing schedule based on telemetry." \
            --label "self-heal-schedule" \
            --label "automation"
