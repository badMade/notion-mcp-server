name: Self-Heal Compute Schedule

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly to recompute the schedule
  workflow_dispatch:

concurrency:
  group: compute-schedule-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compute-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: "!startsWith(github.ref_name, 'selfheal-')"
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install js-yaml for computation
        run: npm ci

      - name: Compute and Update Schedule
        id: compute
        run: |
          node scripts/compute_schedule.mjs

      - name: Check for Diff
        id: diff_check
        run: |
          git add .github/self-heal-schedule.yml .github/workflows/self-heal.yml
          if [ -n "$(git status --porcelain)" ]; then
            echo "diff_exists=true" >> $GITHUB_OUTPUT
            # Validate YAML before proceeding
            node -e "require('js-yaml').load(require('fs').readFileSync('.github/self-heal-schedule.yml', 'utf8'))"
          else
            echo "diff_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.diff_check.outputs.diff_exists == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="selfheal-schedule-$(date +%s)"
          git checkout -b $BRANCH_NAME
          git commit -m "Auto-update self-heal schedule based on telemetry"
          git push origin $BRANCH_NAME

          gh pr create --title "[Self-Heal Schedule] Update cadence" --body "Automated schedule update based on recent repository activity.

          Please review the new schedule configuration." --label "automation,self-heal"
