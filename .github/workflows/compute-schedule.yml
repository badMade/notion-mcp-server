name: Compute Self-Heal Schedule

on:
  schedule:
    - cron: '0 0 * * 0' # Once a week
  workflow_dispatch:

concurrency:
  group: compute-schedule-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compute_schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for Duplicate Schedule PRs
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PRS=$(gh pr list --label self-heal-schedule --state open --json createdAt -q 'length' || echo "0")
          if [ "$RECENT_PRS" -gt "0" ]; then
            echo "SKIP=true" >> $GITHUB_ENV
            echo "Found open self-heal-schedule PRs, skipping..."
          fi

      - name: Compute New Schedule
        id: compute
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci
          chmod +x scripts/compute_schedule.mjs
          ./scripts/compute_schedule.mjs

      - name: Create Pull Request for Schedule Update
        if: env.SKIP != 'true' && steps.compute.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git status --porcelain
          if [ -z "$(git status --porcelain)" ]; then
            echo "No schedule changes needed."
            exit 0
          fi

          BRANCH_NAME="selfheal-schedule-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          git commit -a -m "Update self-heal schedule based on telemetry"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "[Self-Heal Schedule] Update cadence" \
            --body "Automated PR to update the self-healing schedule cadence based on recent repository activity telemetry." \
            --label "automation,self-heal-schedule" \
            --head "$BRANCH_NAME" \
            --base main
