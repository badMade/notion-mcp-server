name: Compute Self-Heal Schedule
on:
  schedule:
    - cron: "0 0 * * 1" # Runs weekly to evaluate cadence
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: compute-schedule-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compute-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for open schedule PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PR=$(gh pr list --label self-heal-schedule --state open --json createdAt -q '.[0].createdAt')
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
            echo "Duplicate open schedule update PR exists. Skipping."
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Compute New Schedule
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/compute_schedule.mjs

      - name: Create PR if changed
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .github/self-heal-schedule.yml .github/workflows/self-heal.yml

          if git diff --cached --quiet; then
            echo "No schedule changes. Exiting."
            exit 0
          fi

          BRANCH_NAME="schedule-update-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          git commit -m "Auto-update self-healing cadence"
          git push -u origin "$BRANCH_NAME"

          PR_BODY="### Self-Heal Schedule Update
          The self-healing cadence has been updated based on recent repository telemetry.
          Please review the updated cron schedule and rationale in \`.github/self-heal-schedule.yml\`."

          gh pr create --title "[Self-Heal Schedule] Update cadence" --body "$PR_BODY" --label self-heal-schedule --label automation --head "$BRANCH_NAME" --base main
