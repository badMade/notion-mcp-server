name: Compute Self-Heal Schedule

on:
  schedule:
    - cron: "0 0 * * 0" # Runs weekly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  compute_schedule:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Check for duplicate PRs
        id: check_duplicate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PR=$(gh pr list --label self-heal-schedule --state open --json createdAt -q '.[0].createdAt' || echo "null")
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
            echo "Duplicate open selfheal schedule PR found. Exiting."
            exit 1
          fi

      - name: Run compute_schedule
        id: compute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/compute_schedule.mjs
          if [ -n "$(git status --porcelain)" ]; then
            echo "SCHEDULE_CHANGED=true" >> $GITHUB_ENV
          else
            echo "SCHEDULE_CHANGED=false" >> $GITHUB_ENV
          fi

      - name: Create PR
        if: ${{ env.SCHEDULE_CHANGED == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="selfheal-schedule-$(date +%s)"
          git checkout -b $BRANCH_NAME

          # Stage specific allowed paths explicitly
          git add .github/workflows/self-heal.yml 2>/dev/null || true
          git add .github/self-heal-schedule.yml 2>/dev/null || true

          git commit -m "Update self-heal schedule cadence"
          git push origin $BRANCH_NAME

          gh pr create --title "[Self-Heal Schedule] Update cadence" \
            --body "Automated code repair schedule update generated by Self-Heal CI pipeline.

            Trigger: ${{ github.event_name }}

            Please review the schedule changes." \
            --label "self-heal-schedule,automation"
