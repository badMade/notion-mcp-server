name: Compute Self-Heal Schedule

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly to re-evaluate schedule
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  compute_schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Compute Schedule
        id: compute
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/compute_schedule.mjs

          if [ -n "$(git status --porcelain)" ]; then
            echo "has_diff=true" >> $GITHUB_OUTPUT
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request for Schedule Update
        if: steps.compute.outputs.has_diff == 'true'
        env:
          # Note: We need a PAT with workflow scope to push changes to .github/workflows
          GITHUB_TOKEN: ${{ secrets.PAT_WITH_WORKFLOW_SCOPE || secrets.GITHUB_TOKEN }}
        run: |
          git add .github/self-heal-schedule.yml .github/workflows/self-heal.yml

          # Use a dynamic branch name
          BRANCH_NAME="selfheal-schedule-update-$(date +%s)"
          git checkout -b $BRANCH_NAME

          git commit -m "Update self-heal schedule based on telemetry"
          git push origin $BRANCH_NAME

          gh pr create --title "[Self-Heal Schedule] Update cadence" \
                       --body "This PR automatically updates the self-heal schedule based on project telemetry." \
                       --label "self-heal-schedule" \
                       --base ${{ github.event.repository.default_branch }}