name: Compute Schedule

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly default, updates itself
  workflow_dispatch:

concurrency:
  group: selfheal-schedule-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compute:
    runs-on: ubuntu-latest
    if: >-
      !startsWith(github.ref_name, 'selfheal-') &&
      github.ref_name == github.event.repository.default_branch
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute Optimal Schedule
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/compute_schedule.mjs

      - name: Check Git Diff
        id: check_diff
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            echo "diff=true" >> $GITHUB_OUTPUT
          else
            echo "diff=false" >> $GITHUB_OUTPUT
            echo "No schedule updates required."
          fi

      - name: Create PR
        if: steps.check_diff.outputs.diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_WITH_WORKFLOW_SCOPE || secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[Self-Heal Schedule] Update cadence"
          BRANCH_NAME="selfheal-schedule-$(date +%s)"

          git checkout -b $BRANCH_NAME
          git commit -m "$TITLE"
          git push origin $BRANCH_NAME

          gh pr create \
            --title "$TITLE" \
            --body "Automated PR to update the self-healing schedule based on repository telemetry." \
            --label "automation" \
            --label "self-heal-schedule"
