name: Compute Schedule

on:
  schedule:
    - cron: '0 0 * * *' # Run daily to evaluate schedule updates
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      !startsWith(github.ref_name, 'selfheal-') &&
      (github.event_name != 'schedule' || github.ref_name == github.event.repository.default_branch)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute New Schedule
        run: ./scripts/compute_schedule.mjs

      - name: Create PR if schedule changed
        env:
          GH_TOKEN: ${{ secrets.PAT_WITH_WORKFLOW_SCOPE }} # Required to update workflow files
        run: |
          git add .github/self-heal-schedule.yml .github/workflows/self-heal.yml

          if [ -z "$(git status --porcelain)" ]; then
            echo "No schedule changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="selfheal-schedule-$(date +%s)"
          git checkout -b $BRANCH_NAME

          git commit -m "Auto-update self-heal schedule"

          # Only push if we actually have GH_TOKEN
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_TOKEN not set, skipping push."
            exit 0
          fi

          git push origin $BRANCH_NAME

          gh pr create \
            --title "[Self-Heal Schedule] Update cadence" \
            --body "Automated update to the self-healing schedule based on repository telemetry." \
            --label "automation" \
            --label "self-heal-schedule"
