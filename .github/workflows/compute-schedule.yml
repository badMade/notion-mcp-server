name: Recompute Self-Heal Schedule

on:
  schedule:
    - cron: '0 0 * * 1' # Runs weekly on Monday to evaluate telemetry
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  compute-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for recent open schedule PRs
        id: check_duplicate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PR=$(gh pr list --label self-heal-schedule --state open --json createdAt -q '.[0].createdAt')
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
             echo "Duplicate open schedule PR found. Skipping."
             echo "SKIP=true" >> $GITHUB_ENV
          else
             echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Compute New Schedule
        if: env.SKIP != 'true'
        run: |
          node scripts/compute_schedule.mjs

      - name: Create Pull Request if Changed
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add .github/self-heal-schedule.yml .github/workflows/self-heal.yml
          if git diff --cached --quiet; then
            echo "Schedule unchanged. Exiting gracefully."
            exit 0
          fi

          BRANCH_NAME="selfheal-schedule-$(date +%s)"
          git checkout -b $BRANCH_NAME

          git commit -m "Auto-update self-heal schedule based on telemetry"
          git push -u origin $BRANCH_NAME

          gh pr create --title "[Self-Heal Schedule] Update cadence" --body "Automated PR to update the self-healing schedule based on recent repository activity/telemetry.

          **Trigger:** Periodic recompute
          **Rationale:** This update reflects the latest PR and commit velocity over the rolling window. See \`.github/self-heal-schedule.yml\` for details.

          _This is an automated PR generated by the compute-schedule workflow._" --label "automation,self-heal-schedule"
