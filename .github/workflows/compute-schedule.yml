name: Compute Self-Heal Schedule

on:
  schedule:
    # Run once a day to check if schedule needs adjustment
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  compute-schedule:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need git history for telemetry

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Compute Schedule
        run: |
          chmod +x scripts/compute_schedule.mjs
          node scripts/compute_schedule.mjs

      - name: Sync Schedule to Workflow
        run: |
          # Use sed as a fallback if js-yaml not available to sync schedule to self-heal.yml
          NEW_CRON=$(grep -A 1 'schedule:' .github/self-heal-schedule.yml | grep -o "'.*'" | tr -d "'" | sed 's/"//g')
          if [ -z "$NEW_CRON" ]; then
             NEW_CRON=$(grep 'schedule:' .github/self-heal-schedule.yml | awk -F': ' '{print $2}' | tr -d '"' | tr -d "'")
          fi

          if [ -n "$NEW_CRON" ]; then
            sed -i "/# AUTO-UPDATED/{n;s/- cron: .*/- cron: \"$NEW_CRON\"/}" .github/workflows/self-heal.yml
          fi

      - name: Check for Changes
        id: git-check
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_diff=true" >> $GITHUB_OUTPUT
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.git-check.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Avoid duplicate PRs
          OPEN_PRS=$(gh pr list --label self-heal-schedule --state open --json number --jq 'length')
          if [[ "$OPEN_PRS" -gt "0" ]]; then
            echo "Open schedule update PR already exists. Skipping creation to prevent thrashing."
            exit 0
          fi

          BRANCH_NAME="schedule-update-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .github/self-heal-schedule.yml .github/workflows/self-heal.yml
          git commit -m "Auto-update Self-Heal schedule based on telemetry"
          git checkout -b "$BRANCH_NAME"
          git push -u origin "$BRANCH_NAME"

          PR_BODY="### Self-Heal Schedule Update

          The telemetry logic has determined a new optimal schedule for the self-healing CI pipeline based on recent repository activity.

          _Generated by Claude Code / Jules Automation_"

          gh pr create --title "[Self-Heal Schedule] Update cadence" --body "$PR_BODY" --label "self-heal-schedule,automation" --head "$BRANCH_NAME" --base main
