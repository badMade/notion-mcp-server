name: Compute Self-Heal Schedule

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly default, updates itself
  workflow_dispatch:

concurrency:
  group: compute-schedule-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compute:
    if: "!startsWith(github.ref_name, 'selfheal-')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install js-yaml@4

      - name: Compute Schedule
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/compute_schedule.mjs

      - name: Create PR if schedule changed
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_WITH_WORKFLOW_SCOPE }}
          GH_TOKEN: ${{ secrets.PAT_WITH_WORKFLOW_SCOPE }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then

            # Check for recent open PRs
            OPEN_PRS=$(gh pr list --label self-heal-schedule --state open --json number | jq length)
            if [ "$OPEN_PRS" -gt 0 ]; then
              echo "A self-heal schedule update PR is already open. Skipping creation."
            else
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"

              BRANCH_NAME="selfheal-schedule-$(date +%s)"
              git checkout -b $BRANCH_NAME
              git add .
              git commit -m "Update self-heal schedule based on telemetry"

              git push origin $BRANCH_NAME

              gh pr create \
                --title "[Self-Heal Schedule] Update cadence" \
                --body "Auto-computed schedule update based on repository telemetry." \
                --label "automation,self-heal-schedule" \
                --base main
            fi
          else
            echo "Schedule unchanged."
          fi