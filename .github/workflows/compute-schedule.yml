name: Recompute Self-Heal Schedule

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly default, updates itself
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: computeschedule-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compute-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Setup git config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for Open Schedule PRs
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PR=$(gh pr list --label self-heal-schedule --state open --limit 1 --json createdAt -q '.[0].createdAt')
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
            echo "Open self-heal-schedule PR detected. Skipping recompute to prevent thrash."
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Compute New Schedule
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/compute_schedule.mjs

      - name: Create Schedule Update PR
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "Schedule unchanged. Exiting."
            exit 0
          fi

          # Gate: File restriction for schedule update
          if git diff --cached --name-only | grep -vE '^(\.github/workflows/self-heal\.yml|\.github/self-heal-schedule\.yml)$' > /dev/null; then
            echo "❌ Forbidden files modified during schedule update. Aborting."
            exit 1
          fi

          BRANCH_NAME="selfheal-schedule-$(date +%s)"
          git checkout -b $BRANCH_NAME
          git commit -m "chore: auto-update self-heal schedule"
          git push -u origin $BRANCH_NAME

          gh pr create \
            --title "[Self-Heal Schedule] Update cadence" \
            --body "Automated telemetry-based schedule update for self-healing pipeline." \
            --label "self-heal-schedule" \
            --label "automation"
