name: Compute Self-Heal Schedule

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday
  workflow_dispatch:

concurrency:
  group: compute-schedule
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute new schedule
        run: |
          chmod +x scripts/compute_schedule.mjs
          node scripts/compute_schedule.mjs

      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain .github/self-heal-schedule.yml .github/workflows/self-heal.yml)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="selfheal-schedule-$(date +%s)"
          git checkout -b $BRANCH_NAME

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .github/self-heal-schedule.yml .github/workflows/self-heal.yml
          git commit -m "[Self-Heal Schedule] Update cadence based on telemetry"
          git push -u origin $BRANCH_NAME

          OPEN_PRS=$(gh pr list --label self-heal-schedule --state open --json number | jq length)
          if [ "$OPEN_PRS" -gt 0 ]; then
            echo "A schedule update PR is already open. Not creating a duplicate."
            exit 0
          else
            gh pr create \
              --title "[Self-Heal Schedule] Update cadence" \
              --body "Telemetry computed a new optimal cadence for the self-heal workflow. Trigger: ${{ github.event_name }}." \
              --label "automation,self-heal-schedule"
          fi
