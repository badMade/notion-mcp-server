name: Compute Self-Heal Schedule

on:
  schedule:
    - cron: "0 0 * * 0" # Weekly computation
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  compute-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compute New Schedule
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/compute_schedule.mjs

      - name: Verify Parsing of YAML changes
        run: |
          node -e "require('js-yaml').load(require('fs').readFileSync('.github/workflows/self-heal.yml', 'utf8'))"
          node -e "require('js-yaml').load(require('fs').readFileSync('.github/self-heal-schedule.yml', 'utf8'))"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check Duplicate PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECENT_PR=$(gh pr list --label self-heal-schedule --state open --json createdAt -q '.[0].createdAt')
          if [ ! -z "$RECENT_PR" ] && [ "$RECENT_PR" != "null" ]; then
            echo "Open schedule PR exists. Skipping."
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Create PR if Schedule Changed
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add .github/workflows/self-heal.yml .github/self-heal-schedule.yml

          if git diff --cached --quiet; then
            echo "No schedule changes. Exiting."
            exit 0
          fi

          BRANCH_NAME="schedule-update-$(date +%s)"
          git checkout -b $BRANCH_NAME

          git commit -m "[Self-Heal Schedule] Update cadence"
          git push origin $BRANCH_NAME

          gh pr create \
            --title "[Self-Heal Schedule] Update cadence" \
            --body "Automated update to the self-healing schedule based on repository telemetry." \
            --label "automation,self-heal-schedule"
