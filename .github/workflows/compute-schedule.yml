name: Self-Heal Schedule Recompute

on:
  schedule:
    - cron: "0 0 * * *"

jobs:
  compute-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Recompute Schedule
        run: node ./scripts/compute_schedule.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Pull Request
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No schedule changes, skipping PR."
            exit 0
          fi
          git commit -m "chore: automated schedule recompute"
          BRANCH="selfheal-schedule-$(date +%s)"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          gh pr create --title "[Self-Heal Schedule] Update cadence" --body "Automated self-heal schedule update based on recent PR velocity and CI metrics." --label self-heal-schedule
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
