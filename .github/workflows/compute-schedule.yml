name: Compute Self-Heal Schedule

on:
  schedule:
    - cron: '0 0 * * *' # Run daily to evaluate schedule updates
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: schedule-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compute-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # GATE check: Only run on default branch
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for git log telemetry

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci || npm install # Ensure dependencies (like js-yaml) are installed

      - name: Check for Duplicate Schedule PRs
        id: check_duplicate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_COUNT=$(gh pr list --label "self-heal-schedule" --state open --json number --jq 'length')
          if [ "$PR_COUNT" -gt "0" ]; then
            echo "Duplicate schedule update PRs found. Skipping computation."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Schedule Computation Script
        id: compute
        if: steps.check_duplicate.outputs.skip == 'false'
        run: |
          chmod +x scripts/compute_schedule.mjs

          # Runs the script. It exits 0 if a change was written and validation passed.
          # Exits 1 if no change is needed, preventing the rest of the workflow.
          node scripts/compute_schedule.mjs || echo "no_update=true" >> $GITHUB_OUTPUT

      - name: Update Workflow YAML
        id: update_yaml
        if: steps.check_duplicate.outputs.skip == 'false' && steps.compute.outputs.no_update != 'true'
        run: |
          # Read new schedule string safely
          NEW_CRON=$(grep "SELFHEAL_SCHEDULE:" .github/self-heal-schedule.yml | sed "s/.*'\(.*\)'.*/\1/")

          # Replace the cron schedule in the workflow file using sed, anchored to the marker
          sed -i "s/\(- cron: \).*# AUTO-UPDATED/\1'$NEW_CRON' # AUTO-UPDATED/" .github/workflows/self-heal.yml

          git status --porcelain

      - name: Create PR
        if: steps.check_duplicate.outputs.skip == 'false' && steps.compute.outputs.no_update != 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="selfheal-schedule-update-${{ github.run_id }}"

          git add .github/self-heal-schedule.yml .github/workflows/self-heal.yml

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Auto-update self-heal schedule cadence"
          git branch "$BRANCH_NAME"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "[Self-Heal Schedule] Update cadence" \
            --body "Automated PR to adjust the self-healing schedule based on repository telemetry.

            This ensures the repair pipeline runs efficiently according to recent activity levels." \
            --label "automation,self-heal-schedule" \
            --head "$BRANCH_NAME" \
            --base "${{ github.event.repository.default_branch }}"
