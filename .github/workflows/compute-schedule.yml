name: Compute Self-Heal Schedule

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly
  workflow_dispatch:

concurrency:
  group: compute-schedule-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  compute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute New Schedule
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/compute_schedule.mjs

      - name: Create Pull Request if Changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            BRANCH_NAME="selfheal-schedule-$(date +%s)"
            git checkout -b $BRANCH_NAME

            git add .github/self-heal-schedule.yml .github/workflows/self-heal.yml

            TITLE="[Self-Heal Schedule] Update cadence"
            git commit -m "$TITLE"

            git push origin $BRANCH_NAME

            gh pr create \
              --title "$TITLE" \
              --body "Automated update of self-heal schedule based on project telemetry." \
              --label "self-heal-schedule" \
              --label "automation"
          else
            echo "Schedule unchanged. No PR needed."
          fi
