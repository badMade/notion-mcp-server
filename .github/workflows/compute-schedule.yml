name: Compute Self-Heal Schedule

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly by default
  workflow_dispatch:

concurrency:
  group: compute-schedule-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compute-schedule:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for telemetry

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Check for duplicate Schedule PRs
        id: check_pr
        run: |
          OPEN_PRS=$(gh pr list --label self-heal-schedule --state open --json number --jq 'length')
          echo "open_prs=$OPEN_PRS" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute new schedule
        if: steps.check_pr.outputs.open_prs == '0'
        run: node scripts/compute_schedule.mjs

      - name: Check for changes
        id: diff
        if: steps.check_pr.outputs.open_prs == '0'
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          BRANCH_NAME="selfheal-schedule-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          git add .github/workflows/self-heal.yml .github/self-heal-schedule.yml
          git commit -m "chore: update self-heal schedule"
          git push -u origin "$BRANCH_NAME"

          gh pr create \
            --title "[Self-Heal Schedule] Update cadence" \
            --body "Automated update of self-heal schedule based on telemetry." \
            --label "automation,self-heal-schedule" \
            --head "$BRANCH_NAME" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
